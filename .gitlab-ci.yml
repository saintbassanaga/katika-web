stages:
  - changelog
  - build
  - deploy

variables:
  NODE_VERSION: "22"

# ── Changelog (git-cliff) ──────────────────────────────────────────────────────
changelog:
  stage: changelog
  image: orhunp/git-cliff:latest
  variables:
    GIT_DEPTH: 0   # fetch full history pour git-cliff
  script:
    - git-cliff --current --output RELEASE_NOTES.md
  artifacts:
    paths:
      - RELEASE_NOTES.md
    expire_in: 1 hour
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/

# ── Build ──────────────────────────────────────────────────────────────────────
build:
  stage: build
  image: node:${NODE_VERSION}-alpine
  cache:
    key:
      files:
        - yarn.lock
    paths:
      - node_modules/
  script:
    - yarn install --frozen-lockfile
    - yarn build
  artifacts:
    paths:
      - dist/
    expire_in: 1 hour
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/

# ── Deploy + GitLab Release ────────────────────────────────────────────────────
deploy:
  stage: deploy
  image: node:${NODE_VERSION}-alpine
  dependencies:
    - build
    - changelog
  script:
    # Déploiement Cloudflare
    - yarn dlx wrangler deploy --env production
    # Création de la release GitLab avec le changelog
    - |
      curl --fail --silent \
        --header "PRIVATE-TOKEN: $GITLAB_TOKEN" \
        --header "Content-Type: application/json" \
        --data "{
          \"name\": \"Release $CI_COMMIT_TAG\",
          \"tag_name\": \"$CI_COMMIT_TAG\",
          \"description\": $(cat RELEASE_NOTES.md | python3 -c 'import sys,json; print(json.dumps(sys.stdin.read()))')
        }" \
        "$CI_API_V4_URL/projects/$CI_PROJECT_ID/releases"
  environment:
    name: production
    url: https://web.katica.app
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/
